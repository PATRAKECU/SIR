<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Modelo SIR – Simulador Epidemiológico{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tema personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme_sir.css') }}">

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='img/sir_icon.png') }}">

    <!-- MathJax -->    
    <script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
            <img src="{{ url_for('static', filename='img/sir_logo.svg') }}"
                 alt="Logo SIR"
                 class="me-2 img-fluid"
                 style="height: 32px; width: auto;">
            Modelo SIR – Simulador Epidemiológico
        </a>

        <!-- Botón para móviles -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Contenido colapsable -->
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto">
                {% if session.user_id %}
                <li class="nav-item">
                    <a class="btn btn-outline-light ms-2" href="{{ url_for('logout') }}">
                        Cerrar sesión
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>

    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
